<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9be;--text:#1a1916;--text2:#6b6860;--text3:#9e9b94;--green:#1a7a4a;--green-bg:#eaf4ee;--green-bd:#b6dfc6;--red:#c0392b;--red-bg:#fdf0ee;--red-bd:#f0b8b2;--amber:#8a5c00;--amber-bg:#fdf6e3;--amber-bd:#f0d898;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.shell{max-width:920px;margin:0 auto;padding:48px 24px 80px;}
.header{margin-bottom:36px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-size:22px;font-weight:500;letter-spacing:-.5px;}
.logo span{color:var(--text3);font-weight:300;}
.header-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{opacity:.85;background:var(--text);}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.btn-green:hover{background:#d8eee2;}
.btn-run{margin-top:12px;width:100%;padding:12px;font-size:14px;}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--rl);padding:36px 24px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s;background:var(--surface);}
.upload-zone:hover,.upload-zone.dragover{background:var(--surface2);border-color:var(--text3);}
.upload-zone input{display:none;}
.upload-icon{font-size:26px;margin-bottom:10px;opacity:.35;}
.upload-title{font-size:15px;font-weight:500;margin-bottom:4px;}
.upload-sub{font-size:13px;color:var(--text3);}
.file-badge{display:inline-flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-size:13px;margin-top:14px;}
.file-badge .rm{cursor:pointer;color:var(--text3);font-size:16px;}
.file-badge .rm:hover{color:var(--red);}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:32px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.metric-value{font-size:22px;font-weight:500;letter-spacing:-.5px;}
.metric-value.pos{color:var(--green);}
.metric-value.neg{color:var(--red);}
.section{margin-bottom:32px;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;color:var(--text3);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.section-title .hint{font-size:11px;text-transform:none;letter-spacing:0;font-weight:400;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
.tr{text-align:right;}.muted{color:var(--text2);}.bold{font-weight:500;}
.pos{color:var(--green);}.neg{color:var(--red);}
.clickable-row{cursor:pointer;transition:background .1s;}
.clickable-row:hover{background:var(--surface2);}
.clickable-row td:first-child{position:relative;padding-left:32px;}
.clickable-row td:first-child::before{content:'\25BA';font-size:8px;color:var(--text3);position:absolute;left:14px;top:50%;transform:translateY(-50%);transition:transform .15s;}
.clickable-row.open td:first-child::before{transform:translateY(-50%) rotate(90deg);}
.drill-row td{padding:0;border-bottom:none;}
.drill-inner{background:#fafaf7;border-top:1px solid var(--border);}
.drill-inner table{font-size:12px;}
.drill-tx-row td{padding:8px 16px 8px 32px;border-bottom:1px solid var(--border);color:var(--text2);}
.drill-tx-row:last-child td{border-bottom:none;}
.drill-tx-row .dc{min-width:95px;white-space:nowrap;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.drill-tx-row .ac{text-align:right;color:var(--text);font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap;min-width:90px;}
.drill-tx-row .rc{white-space:nowrap;}
.reclass-sel{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text);}
.reclass-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;margin-left:4px;}
.reclass-btn:hover{background:var(--surface2);}
.reclass-btn.omit{color:var(--red);border-color:var(--red-bd);}
.reclass-btn.omit:hover{background:var(--red-bg);}
.pill{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle;letter-spacing:.3px;text-transform:uppercase;}
.pill-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.pill-amb{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.transfers-list{display:flex;flex-direction:column;gap:8px;}
.transfer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.transfer-info{flex:1;min-width:0;}
.transfer-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.transfer-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.transfer-amount{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap;}
.transfer-actions{display:flex;gap:6px;}
.tbtn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .1s;white-space:nowrap;}
.tbtn:hover{background:var(--surface2);color:var(--text);}
.tbtn.active-salary{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);font-weight:500;}
.tbtn.active-excluded{background:var(--surface2);color:var(--text);border-color:var(--border2);font-weight:500;}
.tbtn.active-other{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);font-weight:500;}
.ts{font-size:10px;font-weight:500;padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px;}
.ts-in{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.ts-ex{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.ts-ot{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.tbtn.active-buffer{background:#eef4fc;color:#185fa5;border-color:#b8d4f0;font-weight:500;}
.ts-buf{background:#eef4fc;color:#185fa5;border:1px solid #b8d4f0;}
.transfer-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text2);display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;}
.misc-all-done{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--green);text-align:center;font-weight:500;}
.rules-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.rule-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.rule-row:last-child{border-bottom:none;}
.rule-kw{flex:1;font-family:'DM Mono',monospace;font-size:12px;}
.rule-cat{color:var(--text2);font-size:12px;min-width:150px;}
.rule-del{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--red-bd);color:var(--red);background:transparent;cursor:pointer;}
.rule-del:hover{background:var(--red-bg);}
.no-rules{padding:16px;font-size:13px;color:var(--text3);}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px;}
.cat-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;}
.cat-chip .cat-del{cursor:pointer;color:var(--text3);font-size:14px;line-height:1;}
.cat-chip .cat-del:hover{color:var(--red);}
.add-cat-row{display:flex;gap:8px;margin-top:12px;}
.add-cat-row input{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);flex:1;}
.add-cat-row input:focus{outline:none;border-color:var(--text3);}
.gh-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.gh-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.gh-dot.ok{background:var(--green);}
.gh-dot.err{background:var(--red);}
.gh-dot.loading{background:var(--amber);}
.gh-bar input{font-family:'DM Mono',monospace;font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);width:240px;}
.gh-bar input:focus{outline:none;border-color:var(--text3);}
.err-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:12px 16px;color:var(--red);font-size:13px;margin-top:12px;}
.period-label{display:inline-block;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px 14px;color:var(--text2);margin-bottom:20px;letter-spacing:.3px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 16px;border-radius:var(--r);display:none;align-items:center;gap:14px;z-index:9999;white-space:nowrap;}
.toast-undo{font-size:12px;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;}
.toast-undo:hover{background:rgba(255,255,255,.15);}
@media print{
  body{background:#fff;font-size:12px;}
  .shell{padding:0;max-width:100%;}
  .no-print{display:none!important;}
  .gh-bar,#transferSection,#miscInteractive,#rulesSection,#categoriesSection,.upload-zone,#runBtn,#err,#printBtn{display:none!important;}
  .section{break-inside:avoid;margin-bottom:20px;}
  .clickable-row td:first-child{padding-left:12px;}
  .clickable-row td:first-child::before{display:none;}
  .drill-row{display:none!important;}
  .report-print-header{display:block!important;}
  #miscPrintTable{display:block!important;}
  #manualPrintSection{display:block!important;}
}
.report-print-header{display:none;font-size:18px;font-weight:500;margin-bottom:4px;letter-spacing:-.3px;}
.report-print-sub{display:none;font-size:12px;color:var(--text2);margin-bottom:24px;}
@media print{.report-print-sub{display:block;}}
#miscPrintTable{display:none;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div class="logo">Finance <span>/ Analyzer</span></div>
      <div class="header-sub">Upload your monthly bank export to generate a structured report</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-green no-print" id="printBtn" style="display:none" onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>

  <div class="gh-bar no-print">
    <div class="gh-dot" id="ghDot"></div>
    <span id="ghStatus">Enter GitHub token to sync rules across devices</span>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <button class="btn" onclick="connectGitHub()">Connect</button>
  </div>

  <div class="upload-zone" id="dz">
    <input type="file" id="fi" accept=".csv">
    <div class="upload-icon">&#8593;</div>
    <div class="upload-title">Upload bank transaction export</div>
    <div class="upload-sub">Semicolon-separated CSV &middot; Norwegian bank format</div>
    <div id="badge"></div>
  </div>
  <button class="btn btn-primary btn-run" id="runBtn" disabled>Run analysis</button>
  <div id="err"></div>
  <div id="report"></div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-undo" onclick="doUndo()">Undo</button>
</div>

<script>
const GH_OWNER='eriklangaardsolberg-svg',GH_REPO='moneymeeting',GH_FILE='rules.json',GH_BRANCH='main';
const DEFAULT_CATS=['Groceries','Transport','Housing','Childcare','Cleaning','Subscriptions','Wolt','Bakeries','Restaurants','Health & wellbeing','Shopping','Travel','Entertainment','Flowers','Gifts','Professional fees','Education','Insurance','Tax','Books','Kiosk','Misc'];
let CATEGORIES=[...DEFAULT_CATS];
let CUSTOM_RULES=[];
let ghToken=localStorage.getItem('gh_token')||'';
let ghConnected=false,ghSha=null;
let csvText=null,lastReport=null,transferState={},txOverrides={},undoStack=[],toastTimer=null;
let manualExpenses=[]; // [{desc,amount,cat,date}]

const BASE_RULES=[
  {m:'contains',v:'mobil overf\u00f8ring',cat:'INTERNAL'},

const BUDGET_VAR={Groceries:15000,Transport:4000,Cleaning:3840,Childcare:2640,Subscriptions:2000};
const BUDGET_FIXED={'Housing (fixed costs)':40261};

function ghHeaders(){return{'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github+json','Content-Type':'application/json'};}
async function ghLoad(){
  setGhStatus('loading','Connecting\u2026');
  try{
    const r=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE+'?ref='+GH_BRANCH,{headers:ghHeaders()});
    if(r.status===404){ghConnected=true;ghSha=null;setGhStatus('ok','Connected \u00b7 no rules file yet');return;}
    if(!r.ok)throw new Error();
    const j=await r.json();ghSha=j.sha;
    const data=JSON.parse(atob(j.content.replace(/\n/g,'')));
    CUSTOM_RULES=data.rules||[];
    if(data.categories)CATEGORIES=data.categories;
    ghConnected=true;
    setGhStatus('ok','Connected \u00b7 '+CUSTOM_RULES.length+' rule'+(CUSTOM_RULES.length!==1?'s':'')+' loaded');
  }catch(e){setGhStatus('err','Connection failed \u2014 check token');ghConnected=false;}
}
async function ghSave(){
  if(!ghConnected||!ghToken)return;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({rules:CUSTOM_RULES,categories:CATEGORIES},null,2))));
  const body={message:'Update rules',content:content,branch:GH_BRANCH};
  if(ghSha)body.sha=ghSha;
  try{
    const r=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    const j=await r.json();
    if(j.content)ghSha=j.content.sha;
    setGhStatus('ok','Saved \u00b7 '+CUSTOM_RULES.length+' rule'+(CUSTOM_RULES.length!==1?'s':''));
  }catch(e){setGhStatus('err','Save failed');}
}
function setGhStatus(state,msg){
  const dot=document.getElementById('ghDot'),st=document.getElementById('ghStatus');
  dot.className='gh-dot'+(state==='ok'?' ok':state==='err'?' err':state==='loading'?' loading':'');
  st.textContent=msg;
}
async function connectGitHub(){
  ghToken=document.getElementById('ghToken').value.trim();
  if(!ghToken)return;
  localStorage.setItem('gh_token',ghToken);
  await ghLoad();
  document.querySelector('.gh-bar').style.display='none';
}
window.addEventListener('load',async function(){
  var stored=localStorage.getItem('gh_token');
  if(stored){
    ghToken=stored;
    await ghLoad();
    if(ghConnected)document.querySelector('.gh-bar').style.display='none';
  }
});

function getRules(){return CUSTOM_RULES.concat(BASE_RULES);}
function classify(desc){
  var d=desc.toLowerCase();
  for(var i=0;i<getRules().length;i++){
    var r=getRules()[i];
    if(r.m==='contains'&&d.indexOf(r.v)>=0)return r.cat;
    if(r.m==='regex'&&new RegExp(r.v,'i').test(d))return r.cat;
  }
  return 'Misc';
}
function isInternal(row){return classify(row.desc)==='INTERNAL';}
function parseNOK(s){if(!s||!s.trim())return 0;return parseFloat(s.replace(/\s/g,'').replace(/\./g,'').replace(',','.'))||0;}

}

function uid(t){return t.date+'|'+t.desc+'|'+t.ut+'|'+t.inn;}
function analyze(raw){
  var text=raw.replace(/^\uFEFF/,'');
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var allInternals=[],baseTransactions=[],seen={};
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(';');if(cols.length<5)continue;
    var row={date:cols[0].trim(),desc:cols[2].trim(),ut:parseNOK(cols[3]),inn:parseNOK(cols[4])};
    var k=uid(row);if(seen[k])continue;seen[k]=true;
    if(isInternal(row)){allInternals.push(row);continue;}
    var cat=classify(row.desc);
    if(['INCOME_NAV','INCOME_SALARY','INCOME_PROJECT'].indexOf(cat)>=0&&row.inn>0)
      baseTransactions.push(Object.assign({},row,{cat:cat,isIncome:true,amount:row.inn}));
    else if(row.inn>0&&row.ut===0&&cat.indexOf('INCOME')!==0&&row.inn>=100&&!/dnb bank|rente|cashback|utbytte/i.test(row.desc))
      baseTransactions.push(Object.assign({},row,{cat:'Refund',isIncome:true,amount:row.inn}));
    else if(row.ut>0)
      baseTransactions.push(Object.assign({},row,{cat:cat,isIncome:false,amount:row.ut}));
  }
  allInternals.forEach(function(_,i){if(transferState[i]===undefined)transferState[i]='excluded';});
  return buildReport(allInternals,baseTransactions);
}
function buildReport(allInternals,baseTransactions){
  var extraIncome=allInternals.filter(function(_,i){return transferState[i]==='income';}).map(function(t){return Object.assign({},t,{cat:'INCOME_TRANSFER',isIncome:true,amount:t.inn||t.ut});});
  var allTx=baseTransactions.concat(extraIncome);
  var expenses=[],income=allTx.filter(function(t){return t.isIncome;});
  allTx.filter(function(t){return!t.isIncome;}).forEach(function(t){
    var k=uid(t),ov=txOverrides[k];
    if(ov&&ov.omit)return;
    expenses.push(Object.assign({},t,{cat:ov?ov.cat:t.cat}));
  });
  // Add manual expenses
  manualExpenses.forEach(function(m){expenses.push(Object.assign({},m,{isIncome:false,isManual:true}));});
  var byCategory={};
  expenses.forEach(function(t){if(!byCategory[t.cat])byCategory[t.cat]=[];byCategory[t.cat].push(t);});
  var dates=baseTransactions.concat(allInternals).map(function(r){return r.date;}).filter(Boolean).sort();
  var d1=new Date(dates[0]),d2=new Date(dates[dates.length-1]);
  var daysInMonth=new Date(d1.getFullYear(),d1.getMonth()+1,0).getDate();
  var daysElapsed=Math.round((d2-d1)/86400000)+1;
  var varRows=Object.keys(BUDGET_VAR).map(function(cat){return{cat:cat,budget:BUDGET_VAR[cat],actual:(byCategory[cat]||[]).reduce(function(s,t){return s+t.amount;},0)};});
  var fixedRows=Object.keys(BUDGET_FIXED).map(function(cat){return{cat:cat,budget:BUDGET_FIXED[cat],actual:(byCategory['Housing']||[]).reduce(function(s,t){return s+t.amount;},0)};});
  var budgetedCats={'Groceries':1,'Transport':1,'Cleaning':1,'Childcare':1,'Subscriptions':1,'Housing':1};
  var nonBudgeted=Object.keys(byCategory).filter(function(c){return!budgetedCats[c]&&c.indexOf('INCOME')!==0&&c!=='Refund';}).map(function(c){return[c,byCategory[c]];}).sort(function(a,b){return b[1].reduce(function(s,t){return s+t.amount;},0)-a[1].reduce(function(s,t){return s+t.amount;},0);});
  var totalIncome=income.reduce(function(s,t){return s+t.amount;},0);
  var totalExp=expenses.reduce(function(s,t){return s+t.amount;},0);
  return{income:income,totalIncome:totalIncome,varRows:varRows,fixedRows:fixedRows,nonBudgeted:nonBudgeted,byCategory:byCategory,totalExp:totalExp,net:totalIncome-totalExp,allInternals:allInternals,baseTransactions:baseTransactions,daysElapsed:daysElapsed,daysInMonth:daysInMonth,isPartial:daysElapsed<daysInMonth-1,d1:d1};
}

function pushUndo(label,fn){undoStack.push({label:label,fn:fn});showToast(label);}
function showToast(label){
  if(toastTimer)clearTimeout(toastTimer);
  var t=document.getElementById('toast');document.getElementById('toastMsg').textContent=label;
  t.style.display='flex';toastTimer=setTimeout(function(){t.style.display='none';},4500);
}
function doUndo(){
  if(!undoStack.length)return;
  var item=undoStack.pop();item.fn();
  if(toastTimer)clearTimeout(toastTimer);document.getElementById('toast').style.display='none';
  lastReport=buildReport(lastReport.allInternals,lastReport.baseTransactions);render(lastReport);
}

function deleteCategory(cat){

function render(d){
  _txRegistry={};
  var monthName=d.d1.toLocaleString('en-GB',{month:'long',year:'numeric'});
  var h='<div class="report-print-header">Finance Report \u2014 '+monthName+'</div><div class="report-print-sub">Generated '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</div><div class="period-label">'+monthName+(d.isPartial?' \u00b7 partial month':'')+'</div>';

  h+='<div class="metrics"><div class="metric"><div class="metric-label">Total income</div><div class="metric-value pos">'+fmt(d.totalIncome)+'</div></div><div class="metric"><div class="metric-label">Total expenses</div><div class="metric-value">'+fmt(d.totalExp)+'</div></div><div class="metric"><div class="metric-label">Net position</div><div class="metric-value '+(d.net>=0?'pos':'neg')+'">'+(d.net>=0?'+':'')+fmt(d.net)+'</div></div></div>';

  // Income — expandable per source
  var incomeByLabel={};
  d.income.forEach(function(t){
    var ov=txOverrides[uid(t)];
    var label=ov&&ov.incomeLabel?ov.incomeLabel:(t.cat==='INCOME_SALARY'?'Salary':t.cat==='INCOME_NAV'?'NAV':t.cat==='INCOME_PROJECT'?'Project income':t.cat==='INCOME_TRANSFER'?'Salary transfer':'Refund');
    if(!incomeByLabel[label])incomeByLabel[label]=[];
    incomeByLabel[label].push(t);
  });
  var incLabels=['Salary','NAV','Project income','Salary transfer','Refund','EXCLUDE'];
  var incomeRows=Object.keys(incomeByLabel).map(function(label){
    var txs=incomeByLabel[label],total=txs.reduce(function(s,t){return s+t.amount;},0);
    var did='drill_income_'+label.replace(/[^a-zA-Z0-9]/g,'_');
    var opts=incLabels.map(function(c){return'<option value="'+c+'"'+(c===label?' selected':'')+'>'+c+'</option>';}).join('');
    var drows=txs.slice().sort(function(a,b){return b.amount-a.amount;}).map(function(t){
      var k=uid(t),sid='dsel_'+k.replace(/[^a-zA-Z0-9]/g,'_');
      var rid=_regKey(k);
      return'<tr class="drill-tx-row"><td class="dc">'+t.date+'</td><td>'+t.desc+'</td><td class="rc"><select class="reclass-sel" id="'+sid+'">'+opts+'</select><button class="reclass-btn" onclick="reclassifyIncomeTx(_txRegistry[\''+rid+'\'],\''+label.replace(/'/g,"&#39;")+'\')">Move</button><button class="reclass-btn omit" onclick="omitIncomeTx(_txRegistry[\''+rid+'\'])">Remove</button></td><td class="ac">'+fmt(t.amount)+'</td></tr>';
    }).join('');
    return'<tr class="clickable-row" id="tr_'+did+'" onclick="toggleDrillById(\''+did+'\')"><td>'+label+'</td><td class="tr">'+fmt(total)+'</td></tr>'
      +'<tr class="drill-row" id="'+did+'" style="display:none"><td colspan="2"><div class="drill-inner"><table>'+drows+'</table></div></td></tr>';
  }).join('');
  h+='<div class="section"><div class="section-title">Income <span class="hint">\u00b7 click to expand</span></div><div class="table-wrap"><table><tr><th>Source</th><th class="tr">Amount</th></tr>'+incomeRows+'<tr><td class="bold">Total</td><td class="tr bold">'+fmt(d.totalIncome)+'</td></tr></table></div></div>';

  h+='<div class="section"><div class="section-title">Variable costs \u2014 budgeted <span class="hint">\u00b7 click to expand</span></div><div class="table-wrap"><table><tr><th>Category</th><th class="tr">Budget</th><th class="tr">Actual</th><th class="tr">Variance</th></tr>'+d.varRows.map(function(r){return makeClickableRow(r.cat,[r.cat+(r.actual>r.budget?'<span class="pill pill-red">over</span>':''),'<span class="muted">'+fmt(r.budget)+'</span>',fmt(r.actual),varCell(r.actual,r.budget)],d.byCategory[r.cat]||[]);}).join('')+'</table></div></div>';

  h+='<div class="section"><div class="section-title">Fixed costs \u2014 budgeted <span class="hint">\u00b7 click to expand</span></div><div class="table-wrap"><table><tr><th>Category</th><th class="tr">Budget</th><th class="tr">Actual</th><th class="tr">Variance</th></tr>'+d.fixedRows.map(function(r){return makeClickableRow(r.cat,[r.cat+(r.actual>r.budget?'<span class="pill pill-red">over</span>':r.actual===0?'<span class="pill pill-amb">not seen</span>':''),'<span class="muted">'+fmt(r.budget)+'</span>',fmt(r.actual),varCell(r.actual,r.budget)],d.byCategory['Housing']||[]);}).join('')+'</table></div></div>';

  if(d.nonBudgeted.length>0){
    var nbTotal=d.nonBudgeted.reduce(function(s,item){return s+item[1].reduce(function(ss,t){return ss+t.amount;},0);},0);
    var nbWithoutMisc=d.nonBudgeted.filter(function(item){return item[0]!=='Misc';});
    var nbTotalWithoutMisc=nbWithoutMisc.reduce(function(s,item){return s+item[1].reduce(function(ss,t){return ss+t.amount;},0);},0);
    h+='<div class="section"><div class="section-title">Non-budgeted expenses <span class="hint">\u00b7 click to expand \u00b7 total: '+fmt(nbTotalWithoutMisc)+'</span></div><div class="table-wrap"><table><tr><th>Category</th><th class="tr">Transactions</th><th class="tr">Total</th></tr>'+nbWithoutMisc.map(function(item){var cat=item[0],ts=item[1],total=ts.reduce(function(s,t){return s+t.amount;},0);return makeClickableRow(cat+'_nb',[cat+(ts.some(function(t){return t.amount>2000;})?'<span class="pill pill-amb">notable</span>':''),'<span class="muted">'+ts.length+'</span>',fmt(total)],ts);}).join('')+'<tr><td class="bold" colspan="2">Total</td><td class="tr bold">'+fmt(nbTotalWithoutMisc)+'</td></tr></table></div></div>';
  }

  if(d.isPartial){
    // ── Salary logic ────────────────────────────────────────────────────
    // Each person earns 55,697 kr net. If their salary is not yet seen in
    // the file, substitute the expected amount. If seen, use actual.
    var SALARY_PER_PERSON=55697;
    var SALARY_EXPECTED=SALARY_PER_PERSON*2; // 111,394

    // Salary seen = income transactions classified as Salary or Salary transfer
    var salaryActual=d.income.filter(function(t){
      var ov=txOverrides[uid(t)];
      var label=ov&&ov.incomeLabel?ov.incomeLabel:(t.cat==='INCOME_SALARY'?'Salary':t.cat==='INCOME_TRANSFER'?'Salary transfer':null);
      return label==='Salary'||label==='Salary transfer';
    }).reduce(function(s,t){return s+t.amount;},0);

    var salaryReceived=salaryActual>0;
    var salaryForCalc=salaryReceived?salaryActual:SALARY_EXPECTED;

    // Other income (NAV, project, refunds) — always use actual
    var otherIncome=d.income.filter(function(t){
      var ov=txOverrides[uid(t)];
      var label=ov&&ov.incomeLabel?ov.incomeLabel:(t.cat==='INCOME_SALARY'?'Salary':t.cat==='INCOME_TRANSFER'?'Salary transfer':null);
      return label!=='Salary'&&label!=='Salary transfer';
    }).reduce(function(s,t){return s+t.amount;},0);

    var effectiveIncome=salaryForCalc+otherIncome;

    // Projection — use effective income
    var rate=d.daysInMonth/d.daysElapsed,projExp=d.totalExp*rate;
    var totalBudget=d.varRows.reduce(function(s,r){return s+r.budget;},0)+d.fixedRows.reduce(function(s,r){return s+r.budget;},0);
    var projNet=effectiveIncome-projExp;
    h+='<div class="section"><div class="section-title">Projection \u2014 '+d.daysElapsed+' of '+d.daysInMonth+' days elapsed</div>';
    h+='<div class="metrics">';
    h+='<div class="metric"><div class="metric-label">Projected expenses</div><div class="metric-value">'+fmt(projExp)+'</div></div>';
    h+='<div class="metric"><div class="metric-label">'+(salaryReceived?'Actual income':'Expected income')+'</div><div class="metric-value pos">'+fmt(effectiveIncome)+(salaryReceived?'':' <span style="font-size:11px;font-weight:400;color:var(--amber)">est.</span>')+'</div></div>';
    h+='<div class="metric"><div class="metric-label">Projected net</div><div class="metric-value '+(projNet>=0?'pos':'neg')+'">'+(projNet>=0?'+':'')+fmt(projNet)+'</div></div>';
    h+='</div></div>';

    // ── Headroom ─────────────────────────────────────────────────────────
    var fixedItems=[
      {label:'Mortgage',amount:28000,seen:!!(d.byCategory['Housing']||[]).some(function(t){return/bolij|mortgage|lån\s+510288/i.test(t.desc);})},
      {label:'Sameiet OG59A',amount:4004,seen:!!(d.byCategory['Housing']||[]).some(function(t){return/sameiet og59a/i.test(t.desc);})},
      {label:'Lånekassen',amount:3418,seen:!!(d.byCategory['Housing']||[]).some(function(t){return/lånekassen/i.test(t.desc);})},
      {label:'Homely',amount:339,seen:!!(d.byCategory['Housing']||[]).some(function(t){return/homely/i.test(t.desc);})},
      {label:'Unicef',amount:500,seen:!!(d.byCategory['Gifts']||[]).some(function(t){return/unicef/i.test(t.desc);})},
      {label:'Tjøme',amount:1000,seen:!!(d.byCategory['Housing']||[]).some(function(t){return/tj.?me/i.test(t.desc);})},
      {label:'Property tax',amount:500,seen:!!(d.byCategory['Tax']||[]).some(function(t){return t.amount>=400&&t.amount<=600;})},
      {label:'Childcare (nursery)',amount:2640,seen:!!(d.byCategory['Childcare']||[]).length>0},
    ];
    var pendingFixed=fixedItems.filter(function(x){return!x.seen;});
    var pendingFixedTotal=pendingFixed.reduce(function(s,x){return s+x.amount;},0);
    var headroom=effectiveIncome-d.totalExp-pendingFixedTotal;
    var headroomColor=headroom>=0?'pos':'neg';

    h+='<div class="section"><div class="section-title">Month-end headroom</div>';
    h+='<div class="metrics">';
    h+='<div class="metric"><div class="metric-label">'+(salaryReceived?'Income received':'Expected income')+'</div><div class="metric-value pos">'+fmt(effectiveIncome)+(salaryReceived?'':' <span style="font-size:11px;font-weight:400;color:var(--amber)">est.</span>')+'</div></div>';
    h+='<div class="metric"><div class="metric-label">Spent so far</div><div class="metric-value">'+fmt(d.totalExp)+'</div></div>';
    h+='<div class="metric"><div class="metric-label">Headroom left</div><div class="metric-value '+headroomColor+'">'+fmt(headroom)+'</div></div>';
    h+='</div>';
    h+='<div class="table-wrap"><table>';
    h+='<tr><th>Item</th><th class="tr">Amount</th><th>Status</th></tr>';
    if(!salaryReceived){
      h+='<tr><td>Salary (person 1) <span class="pill pill-amb">expected</span></td><td class="tr pos">+'+fmt(SALARY_PER_PERSON)+'</td><td class="muted">not yet received</td></tr>';
      h+='<tr><td>Salary (person 2) <span class="pill pill-amb">expected</span></td><td class="tr pos">+'+fmt(SALARY_PER_PERSON)+'</td><td class="muted">not yet received</td></tr>';
    }else{
      h+='<tr><td>Salary received</td><td class="tr pos">+'+fmt(salaryActual)+'</td><td class="muted">seen in file</td></tr>';
    }
    if(otherIncome>0){
      h+='<tr><td>Other income</td><td class="tr pos">+'+fmt(otherIncome)+'</td><td class="muted">seen in file</td></tr>';
    }
    h+='<tr><td>Expenses so far</td><td class="tr neg">\u2212'+fmt(d.totalExp)+'</td><td class="muted">all classified transactions</td></tr>';
    if(pendingFixed.length>0){
      pendingFixed.forEach(function(x){
        h+='<tr><td>'+x.label+' <span class="pill pill-amb">pending</span></td><td class="tr neg">\u2212'+fmt(x.amount)+'</td><td class="muted">not yet seen this month</td></tr>';
      });
    }
    h+='<tr style="border-top:2px solid var(--border2)"><td class="bold">Headroom remaining</td><td class="tr bold '+headroomColor+'">'+(headroom>=0?'+':'')+fmt(headroom)+'</td><td class="muted">before hitting zero</td></tr>';
    h+='</table></div>';
    if(!salaryReceived){
      h+='<div style="margin-top:10px;font-size:12px;color:var(--amber);padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);">Salary not yet received \u2014 using 55\u202F697\u202Fkr \u00d7 2 as expected income. Once salary transfers appear, mark them as \u201cSalary in\u201d in the transfers panel.</div>';
    }
    h+='</div>';
  }

  // Misc — with total
  var miscTxs=d.byCategory['Misc']||[];
  var miscTotal=miscTxs.reduce(function(s,t){return s+t.amount;},0);
  h+='<div class="section"><div class="section-title">Unclassified (Misc) <span class="hint">\u00b7 '+miscTxs.length+' remaining'+(miscTxs.length>0?' \u00b7 '+fmt(miscTotal):'')+'</span></div>';
  if(miscTxs.length===0){
    h+='<div class="misc-all-done">All transactions classified</div>';
  }else{
    h+='<div id="miscInteractive" class="no-print"><div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th class="tr">Amount</th><th class="tr">Action</th></tr>'+miscTxs.map(function(t,i){return'<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text3)">'+t.date+'</td><td>'+t.desc+'</td><td class="tr">'+fmt(t.amount)+'</td><td class="tr" style="white-space:nowrap"><select id="msel_'+i+'" style="font-family:\'DM Sans\',sans-serif;font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text)">'+CATEGORIES.filter(function(c){return c!=='Misc';}).map(function(c){return'<option>'+c+'</option>';}).join('')+'</select><button class="reclass-btn" onclick="classifyMisc('+i+',false)">Once</button><button class="reclass-btn" onclick="classifyMisc('+i+',true)">+Rule</button><button class="reclass-btn omit" onclick="omitMisc('+i+')">Other month</button></td></tr>';}).join('')+'<tr><td colspan="2" class="bold">Total</td><td class="tr bold">'+fmt(miscTotal)+'</td><td></td></tr></table></div></div>';
    h+='<div id="miscPrintTable"><div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th class="tr">Amount</th></tr>'+miscTxs.map(function(t){return'<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text3)">'+t.date+'</td><td>'+t.desc+'</td><td class="tr">'+fmt(t.amount)+'</td></tr>';}).join('')+'<tr><td colspan="2" class="bold">Total</td><td class="tr bold">'+fmt(miscTotal)+'</td></tr></table></div></div>';
  }
  h+='</div>';

  // Manual expenses — shown in print too
  if(manualExpenses.length>0){
    h+='<div class="section" id="manualPrintSection"><div class="section-title">Manually added expenses</div><div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th>Category</th><th class="tr">Amount</th></tr>';
    manualExpenses.forEach(function(e){
      h+='<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text3)">'+e.date+'</td><td>'+e.desc+'</td><td class="muted">'+e.cat+'</td><td class="tr">'+fmt(e.amount)+'</td></tr>';
    });
    h+='<tr><td colspan="3" class="bold">Total</td><td class="tr bold">'+fmt(manualExpenses.reduce(function(s,e){return s+e.amount;},0))+'</td></tr>';
    h+='</table></div></div>';
  }

  // Transfers — collapsible
  var internals=d.allInternals;
  var incCount=internals.filter(function(_,i){return transferState[i]==='income';}).length;
  var skipCount=internals.filter(function(_,i){return transferState[i]==='other';}).length;
  var transfersCollapsed=window._transfersCollapsed===true;
  h+='<div class="section no-print" id="transferSection">';
  h+='<div class="section-title" style="cursor:pointer" onclick="toggleTransfers()">Internal transfers <span class="hint">\u00b7 '+internals.length+' total \u00b7 '+incCount+' salary \u00b7 click to '+(transfersCollapsed?'expand':'collapse')+'</span></div>';
  h+='<div id="transferBody" style="display:'+(transfersCollapsed?'none':'block')+'">';
  var bufCount=internals.filter(function(_,i){return transferState[i]==='buffer';}).length;
  h+='<div class="transfer-summary"><span>'+internals.length+' total</span><span class="pos">'+incCount+' salary</span>'+(bufCount>0?'<span style="color:#185fa5">'+bufCount+' buffer</span>':'')+'<span class="muted">'+(internals.length-incCount-skipCount-bufCount)+' excluded</span>'+(skipCount>0?'<span style="color:var(--red)">'+skipCount+' other month</span>':'')+'</div><div class="transfers-list">'+internals.map(function(t,i){var state=transferState[i]||'excluded',amount=t.ut>0?t.ut:t.inn,dir=t.ut>0?'outgoing':'incoming',sl=state==='income'?'<span class="ts ts-in">salary</span>':state==='other'?'<span class="ts ts-ot">other month</span>':state==='buffer'?'<span class="ts ts-buf">buffer</span>':'<span class="ts ts-ex">excluded</span>';return'<div class="transfer-card"><div class="transfer-info"><div class="transfer-desc">'+t.desc+'</div><div class="transfer-meta">'+t.date+' \u00b7 '+dir+'</div></div><div class="transfer-amount">'+fmt(amount)+'</div>'+sl+'<div class="transfer-actions"><button class="tbtn '+(state==='income'?'active-salary':'')+'" onclick="setTransfer('+i+',\'income\')">Salary in</button><button class="tbtn '+(state==='buffer'?'active-buffer':'')+'" onclick="setTransfer('+i+',\'buffer\')">Buffer</button><button class="tbtn '+(state==='excluded'?'active-excluded':'')+'" onclick="setTransfer('+i+',\'excluded\')">Exclude</button><button class="tbtn '+(state==='other'?'active-other':'')+'" onclick="setTransfer('+i+',\'other\')">Other month</button></div></div>';}).join('')+'</div>';
  h+='</div></div>';

  h+='<div class="section no-print" id="rulesSection"><div class="section-title">Custom rules <span class="hint">\u00b7 synced to GitHub \u00b7 shared with all users</span></div><div class="rules-panel">'+(CUSTOM_RULES.length===0?'<div class="no-rules">No custom rules yet. Use "+Rule" when classifying an unclassified transaction.</div>':CUSTOM_RULES.map(function(r,i){return'<div class="rule-row"><span class="rule-kw">"'+r.v+'"</span><span class="rule-cat">\u2192 '+r.cat+'</span><button class="rule-del" onclick="deleteCustomRule('+i+')">Delete</button></div>';}).join(''))+'</div></div>';

  h+='<div class="section no-print" id="categoriesSection"></div>';

  // Manual expense entry
  var manCatOpts=CATEGORIES.filter(function(c){return c!=='Misc';}).map(function(c){return'<option>'+c+'</option>';}).join('');
  h+='<div class="section no-print"><div class="section-title">Add expense manually <span class="hint">\u00b7 for cash or missing transactions</span></div>';
  if(manualExpenses.length>0){
    h+='<div class="table-wrap" style="margin-bottom:12px"><table><tr><th>Date</th><th>Description</th><th>Category</th><th class="tr">Amount</th><th></th></tr>';
    manualExpenses.forEach(function(e){
      h+='<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text3)">'+e.date+'</td><td>'+e.desc+'</td><td class="muted">'+e.cat+'</td><td class="tr bold">'+fmt(e.amount)+'</td><td style="text-align:right"><button class="reclass-btn omit" onclick="removeManualExpense(\''+e.uid+'\')">Remove</button></td></tr>';
    });
    h+='<tr><td colspan="3" class="bold">Total</td><td class="tr bold">'+fmt(manualExpenses.reduce(function(s,e){return s+e.amount;},0))+'</td><td></td></tr>';
    h+='</table></div>';
  }
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;">';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Description</label><input id="manDesc" type="text" placeholder="e.g. Cash groceries" style="width:100%;font-family:\'DM Sans\',sans-serif;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);" onkeydown="if(event.key===\'Enter\')addManualExpense()"></div>';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Amount (kr)</label><input id="manAmt" type="number" placeholder="0" step="0.01" style="width:100%;font-family:\'DM Mono\',monospace;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);" onkeydown="if(event.key===\'Enter\')addManualExpense()"></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;">';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Category</label><select id="manCat" style="width:100%;font-family:\'DM Sans\',sans-serif;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);">'+manCatOpts+'</select></div>';
  h+='<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500;display:block;margin-bottom:5px">Date (optional)</label><input id="manDate" type="date" style="width:100%;font-family:\'DM Mono\',monospace;font-size:13px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);"></div>';
  h+='<button class="btn btn-primary" onclick="addManualExpense()" style="padding:8px 20px;height:38px">Add</button>';
  h+='</div></div></div>';

  document.getElementById('report').innerHTML=h;
  renderCatPanel();
}

function toggleTransfers(){
  window._transfersCollapsed=!window._transfersCollapsed;
  var body=document.getElementById('transferBody');
  var section=document.getElementById('transferSection');
  if(body){body.style.display=window._transfersCollapsed?'none':'block';}
  if(section){var title=section.querySelector('.section-title');if(title){var hint=title.querySelector('.hint');if(hint){var incCount=lastReport.allInternals.filter(function(_,i){return transferState[i]==='income';}).length;hint.textContent='\u00b7 '+lastReport.allInternals.length+' total \u00b7 '+incCount+' salary \u00b7 click to '+(window._transfersCollapsed?'expand':'collapse');}}}
}
</script>
</body>
</html>
